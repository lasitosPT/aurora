<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>aurora — animated web components</title>

    <!-- Resolve the bare `gsap` / `three` imports in the built bundle to a CDN,
         so this demo runs with no bundler. Build first: `npm run build`. -->
    <script type="importmap">
      {
        "imports": {
          "gsap": "https://esm.sh/gsap@3",
          "three": "https://esm.sh/three@0.185"
        }
      }
    </script>
    <script type="module">
      import '../dist/index.js'
      import '../dist/three.js'
    </script>

    <style>
      :root {
        --aurora-accent: #6d5cff;
        --aurora-accent-hover: #5a49e0;
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, sans-serif;
        color: #eee;
        background: #0b0b12;
        overflow-x: hidden;
      }
      aurora-scene {
        position: fixed;
        inset: 0;
        z-index: 0;
        opacity: 0.5;
      }
      main {
        position: relative;
        z-index: 1;
        max-width: 780px;
        margin: 0 auto;
        padding: 12vh 24px 20vh;
        display: flex;
        flex-direction: column;
        gap: 48px;
      }
      h1 {
        font-size: clamp(2.5rem, 8vw, 5rem);
        margin: 0;
        line-height: 1.05;
      }
      section {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .label {
        font-size: 0.8rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #8a8aa0;
      }
      .card {
        padding: 32px;
        border-radius: 16px;
        background: linear-gradient(135deg, #1a1a2e, #12121f);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      }
      aurora-marquee {
        font-size: 1.5rem;
        font-weight: 700;
        color: #8a8aa0;
      }
    </style>
  </head>
  <body>
    <aurora-scene color="#6d5cff" speed="1.2"></aurora-scene>

    <main>
      <aurora-text stagger="0.05"><h1>Motion, built in.</h1></aurora-text>

      <section>
        <span class="label">aurora-magnetic + aurora-button</span>
        <div>
          <aurora-magnetic strength="0.5">
            <aurora-button>Hover me</aurora-button>
          </aurora-magnetic>
        </div>
      </section>

      <section>
        <span class="label">aurora-tilt</span>
        <aurora-tilt max="14">
          <div class="card">Tilt me toward your cursor.</div>
        </aurora-tilt>
      </section>

      <section>
        <span class="label">aurora-marquee</span>
        <aurora-marquee speed="80"
          >GSAP · Three.js · Web Components · Zero config ·
        </aurora-marquee>
      </section>
    </main>
  </body>
</html>
